<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 Книга истории — Свиток.Доставка</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0c0a0a;
            background-image: radial-gradient(circle at 10% 20%, #1a1410 0%, #080606 90%);
            color: #e4dac7;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px;
            background: rgba(20, 15, 12, 0.6);
            backdrop-filter: blur(3px);
            border-radius: 48px;
            border: 1px solid rgba(200, 170, 120, 0.15);
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 10;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(200, 170, 120, 0.15);
            padding-bottom: 20px;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 4px;
            color: #f3e5c8;
            text-decoration: none;
        }
        .logo span { color: #b89a7a; }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-back {
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid rgba(200, 170, 120, 0.2);
            background: rgba(255, 215, 150, 0.03);
            color: #b3a390;
            text-decoration: none;
            font-size: 0.65rem;
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        .btn-back:hover {
            background: rgba(212, 175, 55, 0.12);
            border-color: rgba(212, 175, 55, 0.4);
            color: #d4af37;
        }

        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.8rem;
            text-align: center;
            margin-bottom: 8px;
            color: #efe6d3;
        }
        .page-title small {
            display: block;
            font-size: 1rem;
            color: #7f7364;
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .book-intro {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 30px;
            margin-bottom: 25px;
            border: 1px solid rgba(200, 150, 255, 0.05);
        }
        .book-intro .big-icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 10px;
        }
        .book-intro p {
            color: #b3a390;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .book-intro .count {
            color: #b89ad4;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .scroll-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 20px 0;
        }

        .scroll-card {
            background: rgba(26, 20, 16, 0.5);
            border-radius: 24px;
            padding: 20px 25px;
            border: 1px solid rgba(200, 150, 255, 0.08);
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .scroll-card:hover {
            border-color: rgba(200, 150, 255, 0.2);
            background: rgba(26, 20, 16, 0.7);
            transform: translateX(5px);
        }

        .scroll-card .header-card {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .scroll-card .header-card .icon {
            font-size: 1.8rem;
        }
        .scroll-card .header-card .title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            color: #f0e4d0;
        }
        .scroll-card .header-card .number {
            margin-left: auto;
            color: #7f7364;
            font-size: 0.8rem;
        }
        .scroll-card .text {
            color: #b3a390;
            font-size: 0.9rem;
            line-height: 1.7;
            padding-left: 10px;
            border-left: 2px solid rgba(200, 150, 255, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 30px;
            border: 2px dashed rgba(200, 150, 255, 0.1);
        }
        .empty-state .icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 15px;
        }
        .empty-state h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            color: #7f7364;
            margin-bottom: 10px;
        }
        .empty-state p {
            color: #5f5548;
            font-size: 0.95rem;
        }
        .empty-state .btn-battle {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 35px;
            border-radius: 60px;
            border: 1px solid #b89ad4;
            background: rgba(200, 150, 255, 0.05);
            color: #b89ad4;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        .empty-state .btn-battle:hover {
            background: rgba(200, 150, 255, 0.12);
            border-color: #b89ad4;
            transform: scale(1.02);
        }

        @media (max-width: 600px) {
            .wrapper { padding: 18px; border-radius: 32px; }
            .header { flex-direction: column; align-items: flex-start; }
            .header-right { width: 100%; justify-content: space-between; }
            .page-title { font-size: 2rem; }
            .scroll-card { padding: 15px 18px; }
            .scroll-card .header-card .title { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <div class="wrapper">
        <header class="header">
            <a href="index.html" class="logo">✦ Свиток <span>истории</span></a>
            <div class="header-right">
                <a href="battle.html" class="btn-back" style="border-color:rgba(255,100,100,0.2); color:#e89080;">⚔️ Битва</a>
                <a href="index.html" class="btn-back">← Главная</a>
            </div>
        </header>

        <h1 class="page-title">
            📖 Книга истории
            <small>Собирай свитки в битве и узнавай тайны Боровичей</small>
        </h1>

        <div id="bookContent">
            <!-- Контент рендерится JS -->
        </div>
    </div>

    <script>
        // ============================================
        // КНИГА ИСТОРИИ
        // ============================================

        const bookContent = document.getElementById('bookContent');

        function renderBook() {
            const collectedScrolls = JSON.parse(localStorage.getItem('collectedScrolls')) || [];

            if (collectedScrolls.length === 0) {
                bookContent.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">📜</span>
                        <h3>Книга пуста</h3>
                        <p>Вы ещё не собрали ни одного свитка.</p>
                        <p style="color:#7f7364; font-size:0.85rem; margin-top:5px;">
                            Свитки появляются в битве каждую минуту и исчезают через 5 секунд.
                        </p>
                        <a href="battle.html" class="btn-battle">⚔️ Отправиться в битву</a>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="book-intro">
                    <span class="big-icon">📖</span>
                    <p>
                        В этой книге собраны <span class="count">${collectedScrolls.length}</span> 
                        древних свитков, найденных вами в битвах.
                    </p>
                    <p style="font-size:0.85rem; color:#7f7364; margin-top:5px;">
                        Каждый свиток хранит частицу истории Боровичей и магии этого края.
                    </p>
                </div>
                <div class="scroll-list">
            `;

            collectedScrolls.forEach((scroll, index) => {
                html += `
                    <div class="scroll-card">
                        <div class="header-card">
                            <span class="icon">📜</span>
                            <span class="title">${scroll.title || 'Древний свиток'}</span>
                            <span class="number">#${index + 1}</span>
                        </div>
                        <div class="text">${scroll.text || 'Текст не найден...'}</div>
                    </div>
                `;
            });

            html += `
                </div>
                <div style="text-align:center; margin-top:20px; color:#5f5548; font-size:0.8rem;">
                    ⚡ Продолжайте битвы, чтобы найти новые свитки!
                </div>
            `;

            bookContent.innerHTML = html;
        }

        // --- Частицы ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3 - 0.1;
                this.opacity = Math.random() * 0.6 + 0.2;
                this.shimmer = Math.random() * Math.PI * 2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.shimmer += 0.02;
                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) this.reset();
                this.currentOpacity = this.opacity * (0.7 + 0.3 * Math.sin(this.shimmer));
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200, 150, 255, ${this.currentOpacity * 0.5})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < 70; i++) particles.push(new Particle());

        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // --- Рендерим книгу ---
        renderBook();

        // Синхронизация с localStorage
        window.addEventListener('storage', function(e) {
            if (e.key === 'collectedScrolls') {
                renderBook();
            }
        });

        console.log('📖 Книга истории загружена!');
    </script>
</body>
</html>
