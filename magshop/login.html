<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ Вход в Свиток — Боровичи</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #0c0a0a;
            background-image: radial-gradient(circle at 10% 20%, #1a1410 0%, #080606 90%);
            color: #e4dac7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .login-wrapper {
            max-width: 480px;
            width: 100%;
            padding: 40px 35px;
            background: rgba(20, 15, 12, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            border: 1px solid rgba(200, 170, 120, 0.15);
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8), inset 0 0 80px rgba(180, 120, 70, 0.03);
            position: relative;
            z-index: 10;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4rem;
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #f3e5c8;
            text-shadow: 0 0 15px rgba(200, 150, 80, 0.2);
        }
        .login-header .logo span {
            color: #b89a7a;
            font-weight: 300;
        }
        .login-header p {
            color: #9a8b7a;
            font-size: 0.9rem;
            letter-spacing: 3px;
            margin-top: 8px;
        }

        /* --- Переключатель вкладок --- */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(10, 8, 6, 0.5);
            border-radius: 60px;
            padding: 6px;
            border: 1px solid rgba(200, 170, 120, 0.08);
        }
        .tab-btn {
            flex: 1;
            padding: 12px 10px;
            border: none;
            background: transparent;
            border-radius: 40px;
            color: #7f7364;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
        }
        .tab-btn.active {
            background: rgba(212, 175, 55, 0.12);
            color: #d4af37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.15);
        }
        .tab-btn:hover:not(.active) {
            color: #b3a390;
        }

        /* --- Формы --- */
        .form-container {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .form-container.active {
            display: block;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #9a8b7a;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .form-group input {
            width: 100%;
            padding: 16px 22px;
            background: rgba(10, 8, 6, 0.7);
            border: 1px solid rgba(200, 170, 120, 0.12);
            border-radius: 60px;
            color: #f0e4d0;
            font-size: 0.95rem;
            font-family: 'Montserrat', sans-serif;
            outline: none;
            transition: all 0.4s;
        }
        .form-group input::placeholder {
            color: #5f5548;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .form-group input:focus {
            border-color: #d4af37;
            background: rgba(20, 15, 10, 0.9);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.06);
            animation: borderGlow 2s infinite alternate;
        }
        @keyframes borderGlow {
            0% { border-color: rgba(212, 175, 55, 0.2); }
            100% { border-color: rgba(212, 175, 55, 0.7); }
        }

        .btn-login {
            width: 100%;
            padding: 18px;
            background: linear-gradient(145deg, #1f1814, #0e0b09);
            border: 1px solid #d4af37;
            border-radius: 60px;
            color: #f3e5c8;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            font-family: 'Montserrat', sans-serif;
            position: relative;
            overflow: hidden;
            margin-top: 5px;
        }
        .btn-login:hover {
            background: linear-gradient(145deg, #2a201a, #14100d);
            color: #fff6e0;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.1);
            transform: scale(1.01);
        }
        .btn-login::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(212,175,55,0.03), transparent, rgba(212,175,55,0.06), transparent);
            animation: rotateBg 6s linear infinite;
        }
        @keyframes rotateBg {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .form-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #5f5548;
        }
        .form-footer a {
            color: #d4af37;
            text-decoration: none;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            transition: all 0.3s;
        }
        .form-footer a:hover {
            border-bottom-color: #d4af37;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #7f7364;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: all 0.3s;
            text-align: center;
            width: 100%;
        }
        .back-link:hover {
            color: #d4af37;
        }

        /* --- Сообщения --- */
        .message {
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            margin-top: 15px;
            display: none;
        }
        .message.success {
            display: block;
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.15);
            color: #d4af37;
        }
        .message.error {
            display: block;
            background: rgba(200, 80, 60, 0.08);
            border: 1px solid rgba(200, 80, 60, 0.15);
            color: #c47a6a;
        }

        /* --- Адаптив --- */
        @media (max-width: 500px) {
            .login-wrapper { padding: 25px 18px; border-radius: 32px; }
            .login-header .logo { font-size: 1.8rem; letter-spacing: 4px; }
            .tab-btn { font-size: 0.7rem; padding: 10px 8px; }
            .form-group input { padding: 14px 18px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <div class="login-wrapper">
        <div class="login-header">
            <div class="logo">✦ Свиток <span>доставки</span></div>
            <p>войдите в магическую сеть</p>
        </div>

        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="login">Вход</button>
            <button class="tab-btn" data-tab="register">Регистрация</button>
        </div>

        <!-- Форма Входа -->
        <div class="form-container active" id="login-form">
            <form id="loginForm" onsubmit="return false;">
                <div class="form-group">
                    <label>📧 Электронная почта</label>
                    <input type="email" placeholder="mag@borovichi.ru" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>🔑 Пароль</label>
                    <input type="password" placeholder="••••••••" id="loginPassword" required>
                </div>
                <button type="submit" class="btn-login" id="loginSubmit">Войти</button>
                <div class="message" id="loginMessage"></div>
            </form>
            <div class="form-footer">
                Нет аккаунта? <a href="#" id="switchToRegister">Создать</a>
            </div>
        </div>

        <!-- Форма Регистрации -->
        <div class="form-container" id="register-form">
            <form id="registerForm" onsubmit="return false;">
                <div class="form-group">
                    <label>🧙 Имя мага</label>
                    <input type="text" placeholder="Александр Великий" id="regName" required>
                </div>
                <div class="form-group">
                    <label>📧 Электронная почта</label>
                    <input type="email" placeholder="mag@borovichi.ru" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>🔑 Пароль</label>
                    <input type="password" placeholder="минимум 6 символов" id="regPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label>🔐 Подтвердите пароль</label>
                    <input type="password" placeholder="••••••••" id="regPasswordConfirm" required>
                </div>
                <button type="submit" class="btn-login" id="registerSubmit">Создать аккаунт</button>
                <div class="message" id="registerMessage"></div>
            </form>
            <div class="form-footer">
                Уже есть аккаунт? <a href="#" id="switchToLogin">Войти</a>
            </div>
        </div>

        <a href="index.html" class="back-link">← Вернуться в лавку</a>
    </div>

    <script>
        (function() {
            // --- Частицы (такие же как на главной) ---
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            class Particle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.size = Math.random() * 2.5 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.4;
                    this.speedY = (Math.random() - 0.5) * 0.4 - 0.1;
                    this.opacity = Math.random() * 0.7 + 0.2;
                    this.shimmer = Math.random() * Math.PI * 2;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    this.shimmer += 0.02;
                    if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                        this.reset();
                    }
                    this.currentOpacity = this.opacity * (0.7 + 0.3 * Math.sin(this.shimmer));
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(212, 175, 55, ${this.currentOpacity * 0.7})`;
                    ctx.fill();
                    if (this.size > 1.5) {
                        ctx.shadowColor = 'rgba(212, 175, 55, 0.2)';
                        ctx.shadowBlur = 12;
                    }
                }
            }

            function initParticles(count = 70) {
                particles = [];
                for (let i = 0; i < count; i++) {
                    particles.push(new Particle());
                }
            }
            initParticles();

            function animateParticles() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animateParticles);
            }
            animateParticles();

            // --- Переключение вкладок ---
            const tabBtns = document.querySelectorAll('.tab-btn');
            const containers = {
                login: document.getElementById('login-form'),
                register: document.getElementById('register-form')
            };

            tabBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    tabBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');

                    const tab = this.dataset.tab;
                    Object.keys(containers).forEach(key => {
                        containers[key].classList.toggle('active', key === tab);
                    });

                    // Скрываем сообщения
                    document.querySelectorAll('.message').forEach(m => {
                        m.style.display = 'none';
                        m.className = 'message';
                    });
                });
            });

            // --- Переключение через ссылки ---
            document.getElementById('switchToRegister')?.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelector('.tab-btn[data-tab="register"]').click();
            });
            document.getElementById('switchToLogin')?.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelector('.tab-btn[data-tab="login"]').click();
            });

            // --- Логика входа ---
            const loginForm = document.getElementById('loginForm');
            const loginSubmit = document.getElementById('loginSubmit');
            const loginMessage = document.getElementById('loginMessage');

            loginSubmit.addEventListener('click', function() {
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value.trim();

                if (!email || !password) {
                    loginMessage.className = 'message error';
                    loginMessage.textContent = '❓ Заполните все поля, маг!';
                    loginMessage.style.display = 'block';
                    return;
                }

                // Имитация проверки (в реальности был бы запрос к серверу)
                if (email === 'mag@borovichi.ru' && password === '123456') {
                    loginMessage.className = 'message success';
                    loginMessage.textContent = '✨ Добро пожаловать, хранитель! Перенаправление...';
                    loginMessage.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    loginMessage.className = 'message error';
                    loginMessage.textContent = '❌ Неверная почта или пароль. Попробуйте снова.';
                    loginMessage.style.display = 'block';
                }
            });

            // --- Логика регистрации ---
            const registerSubmit = document.getElementById('registerSubmit');
            const registerMessage = document.getElementById('registerMessage');

            registerSubmit.addEventListener('click', function() {
                const name = document.getElementById('regName').value.trim();
                const email = document.getElementById('regEmail').value.trim();
                const password = document.getElementById('regPassword').value;
                const confirm = document.getElementById('regPasswordConfirm').value;

                if (!name || !email || !password || !confirm) {
                    registerMessage.className = 'message error';
                    registerMessage.textContent = '❓ Все поля обязательны для заполнения!';
                    registerMessage.style.display = 'block';
                    return;
                }

                if (password.length < 6) {
                    registerMessage.className = 'message error';
                    registerMessage.textContent = '❌ Пароль должен быть не менее 6 символов.';
                    registerMessage.style.display = 'block';
                    return;
                }

                if (password !== confirm) {
                    registerMessage.className = 'message error';
                    registerMessage.textContent = '❌ Пароли не совпадают!';
                    registerMessage.style.display = 'block';
                    return;
                }

                // Успешная регистрация
                registerMessage.className = 'message success';
                registerMessage.textContent = `🎉 Поздравляем, ${name}! Аккаунт создан. Теперь войдите.`;
                registerMessage.style.display = 'block';

                // Автоматически переключаем на вход и подставляем почту
                setTimeout(() => {
                    document.querySelector('.tab-btn[data-tab="login"]').click();
                    document.getElementById('loginEmail').value = email;
                    document.getElementById('loginPassword').value = '';
                    registerMessage.style.display = 'none';
                }, 2000);
            });

            // --- Enter для отправки форм ---
            document.getElementById('loginForm').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    loginSubmit.click();
                }
            });
            document.getElementById('registerForm').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    registerSubmit.click();
                }
            });

        })();
    </script>

</body>
</html>
